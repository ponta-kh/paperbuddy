services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: -jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data
    user: root
    volumes:
      - dynamodb-local-data:/home/dynamodblocal/data
    ports:
      - "8001:8000"

  dynamodb-init:
    build:
      context: .
    command: python -m src.dependencies.initialize_local_dynamodb
    environment: &local-environment
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: ap-northeast-1
      DYNAMODB_CHAT_TABLE_NAME: paperbuddy-local-chat
      DYNAMODB_LIBRARY_TABLE_NAME: paperbuddy-local-library
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      CHAT_INFRASTRUCTURE_MODE: local
      SIMULATED_LLM_DELAY_SECONDS: "2"
    depends_on:
      - dynamodb-local
    restart: "no"

  backend:
    build:
      context: .
    environment: *local-environment
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

volumes:
  dynamodb-local-data:
