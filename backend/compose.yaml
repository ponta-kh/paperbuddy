services:
  backend:
    build:
      context: .
    # Local-only override so profiles with 0600 permissions remain readable.
    user: "0:0"
    env_file:
      - .env
    environment:
      AWS_CONFIG_FILE: /tmp/.aws/config
      AWS_SHARED_CREDENTIALS_FILE: /tmp/.aws/credentials
    volumes:
      - ${HOME}/.aws:/tmp/.aws:ro
    ports:
      - "8000:8000"
