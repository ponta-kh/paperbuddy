[tools]
node = "26.3.0"

[tasks.dev]
description = "Start the frontend and backend development servers"
depends = ["dev:backend", "dev:frontend"]

[tasks."dev:backend"]
description = "Start the FastAPI development server"
dir = "backend"
run = "uv run uvicorn main:app --reload --env-file .env"

[tasks."dev:frontend"]
description = "Start the Vite development server"
dir = "frontend"
run = "pnpm dev"

[tasks."frontend:build"]
description = "Build the frontend for deployment"
dir = "frontend"
run = "pnpm build"

[tasks."infra:synth"]
description = "Synthesize the development AWS infrastructure"
depends = ["frontend:build"]
dir = "infra"
run = "pnpm cdk synth PaperBuddyDev"

[tasks."infra:test"]
description = "Test the AWS infrastructure"
dir = "infra"
run = "pnpm test"

[tasks."infra:deploy:dev"]
description = "Deploy the development AWS infrastructure"
depends = ["frontend:build"]
dir = "infra"
run = "pnpm cdk deploy PaperBuddyDev --parameters BedrockKnowledgeBaseId=$BEDROCK_KNOWLEDGE_BASE_ID --parameters BedrockModelArn=$BEDROCK_MODEL_ARN"
