[tools]
node = "26.3.0"

[tasks.dev]
description = "Start the frontend and backend development servers"
depends = ["dev:backend", "dev:frontend"]

[tasks."dev:backend"]
description = "Start the FastAPI development server"
dir = "backend"
run = "uv run uvicorn main:app --reload --env-file .env"

[tasks."dev:frontend"]
description = "Start the Vite development server"
dir = "frontend"
run = "pnpm dev"

[tasks."frontend:build"]
description = "Build the frontend for deployment"
dir = "frontend"
run = "pnpm build"

[tasks."backend:test:domain"]
description = "Test domain behavior and enforce 100 percent branch coverage"
dir = "backend"
run = "uv run pytest tests/domain --cov=src/domain --cov-branch --cov-report=term-missing --cov-fail-under=100"

[tasks."backend:test:application"]
description = "Test use cases with mocked output ports"
dir = "backend"
run = "uv run pytest tests/application --cov=src/application/use_cases --cov-branch --cov-report=term-missing --cov-fail-under=100"

[tasks."backend:test"]
description = "Run all backend tests after coverage gates"
depends = ["backend:test:domain", "backend:test:application"]
dir = "backend"
run = "uv run pytest"

[tasks."infra:synth"]
description = "Synthesize the development AWS infrastructure"
depends = ["frontend:build"]
dir = "infra"
run = "pnpm cdk synth PaperBuddyDev"

[tasks."infra:test"]
description = "Test the AWS infrastructure"
dir = "infra"
run = "pnpm test"

[tasks."infra:deploy:dev"]
description = "Deploy the development AWS infrastructure"
depends = ["frontend:build"]
dir = "infra"
run = "pnpm cdk deploy PaperBuddyDev --parameters BedrockKnowledgeBaseId=$BEDROCK_KNOWLEDGE_BASE_ID --parameters BedrockModelArn=$BEDROCK_MODEL_ARN"
