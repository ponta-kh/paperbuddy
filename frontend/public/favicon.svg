<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>PaperBuddy</title>

  <!-- 論文ページ -->
  <rect x="4" y="2" width="42" height="52" rx="5" fill="#1E2A4A"/>

  <!-- ページ折れ（ドッグイヤー） -->
  <polygon points="34,2 46,14 46,2" fill="#2E3F6F"/>
  <polygon points="34,2 46,14 34,14" fill="#3D56A0" opacity="0.5"/>

  <!-- 本文横線 -->
  <rect x="10" y="18" width="22" height="4" rx="2" fill="#6C7FBD" opacity="0.9"/>
  <rect x="10" y="27" width="16" height="4" rx="2" fill="#6C7FBD" opacity="0.9"/>
  <rect x="10" y="36" width="20" height="4" rx="2" fill="#6C7FBD" opacity="0.9"/>

  <!-- チャット吹き出し -->
  <rect x="20" y="38" width="40" height="24" rx="7" fill="#00BFA5"/>

  <!-- 吹き出しの尾 -->
  <polygon points="24,60 34,60 27,70" fill="#00BFA5"/>

  <!-- 省略記号 (…) -->
  <circle cx="31" cy="50" r="3" fill="white"/>
  <circle cx="40" cy="50" r="3" fill="white"/>
  <circle cx="49" cy="50" r="3" fill="white"/>
</svg>
