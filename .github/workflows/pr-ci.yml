name: Pull Request CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "infra/**"
      - ".node-version"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/pr-ci.yml"

permissions:
  contents: read

jobs:
  changes:
    name: 変更フォルダ判定
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 変更フォルダを判定
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" > changed-files.txt

          if grep -qE '^(backend/|\.github/workflows/pr-ci\.yml)' changed-files.txt; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -qE '^(frontend/|\.node-version|pnpm-lock.yaml|pnpm-workspace.yaml|\.github/workflows/pr-ci\.yml)' changed-files.txt; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -qE '^(infra/|\.node-version|pnpm-lock.yaml|pnpm-workspace.yaml|\.github/workflows/pr-ci\.yml)' changed-files.txt; then
            echo "infra=true" >> "$GITHUB_OUTPUT"
          else
            echo "infra=false" >> "$GITHUB_OUTPUT"
          fi

  backend:
    name: backend フォーマット・Lint・テスト
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: uv をセットアップ
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          working-directory: backend

      - name: 依存関係をインストール
        run: uv --directory backend sync --frozen

      - name: フォーマットを確認
        run: uv --directory backend run ruff format --check .

      - name: Lintを実行
        run: uv --directory backend run ruff check .

      - name: テストを実行
        run: uv --directory backend run pytest

  frontend:
    name: frontend フォーマット・Lint・テスト
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: pnpm をセットアップ
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: 依存関係をインストール
        run: pnpm install --frozen-lockfile

      - name: フォーマットを確認
        run: pnpm --filter frontend exec biome format .

      - name: Lintを実行
        run: pnpm --filter frontend lint

      - name: テストを実行
        run: pnpm --filter frontend test

  infra:
    name: infra フォーマット・Lint・テスト
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: pnpm をセットアップ
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: 依存関係をインストール
        run: pnpm install --frozen-lockfile

      - name: フォーマットを確認
        run: pnpm --filter infra exec biome format .

      - name: Lintを実行
        run: pnpm --filter infra lint

      - name: テストを実行
        run: pnpm --filter infra test
