name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      stack-name:
        description: "デプロイ対象のCloudFormationスタック名"
        required: true
        default: "PaperBuddyDev"
      aws-region:
        description: "デプロイ対象のAWSリージョン"
        required: true
        default: "ap-northeast-1"
      bedrock-generation-model-identifier:
        description: "Bedrock生成モデル識別子"
        required: true
        default: "apac.anthropic.claude-3-5-sonnet-20241022-v2:0"

permissions:
  contents: read
  id-token: write

env:
  PNPM_VERSION: "10"

concurrency:
  group: deploy-backend-${{ inputs['stack-name'] }}
  cancel-in-progress: false

jobs:
  deploy:
    name: バックエンドをデプロイ
    runs-on: ubuntu-latest
    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: pnpm をセットアップ
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: 依存関係をインストール
        run: pnpm install --frozen-lockfile

      - name: CDK設定ファイルを作成
        shell: bash
        run: |
          set -euo pipefail

          cat > infra/.env <<'EOF'
          STACK_NAME=${{ inputs['stack-name'] }}
          AWS_REGION=${{ inputs['aws-region'] }}
          BEDROCK_GENERATION_MODEL_IDENTIFIER=${{ inputs['bedrock-generation-model-identifier'] }}
          EOF

      - name: フロントエンドassetを準備
        run: pnpm --filter frontend build

      - name: AWS認証を設定
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs['aws-region'] }}

      - name: バックエンドをhotswapデプロイ
        working-directory: infra
        run: pnpm cdk deploy "${{ inputs['stack-name'] }}" --hotswap --require-approval never

  verify:
    name: デプロイ結果を確認
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: AWS認証を設定
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs['aws-region'] }}

      - name: CloudFront経由でヘルスチェック
        shell: bash
        run: |
          set -euo pipefail

          distribution_domain_name="$(
            aws cloudformation describe-stacks \
              --region "${{ inputs['aws-region'] }}" \
              --stack-name "${{ inputs['stack-name'] }}" \
              --query "Stacks[0].Outputs[?OutputKey=='DistributionDomainName'].OutputValue | [0]" \
              --output text
          )"

          curl --fail-with-body "https://${distribution_domain_name}/api/health"
